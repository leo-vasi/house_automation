[wokwi]
version = 1
firmware = "ESP32_GENERIC-20240602-v1.23.0.bin"
elf = ""

# Porta RFC2217 para o mpremote conectar ao ESP32 simulado
rfc2217ServerPort = 4001
iotGateway = "ws://localhost:9011"


# Redireciona localhost:8180 para porta 80 do ESP32 simulado
[[net.forward]]
from = "localhost:9080"
to = "target:80"